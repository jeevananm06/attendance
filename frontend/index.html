<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1e40af" />
    <meta name="description" content="Labour Attendance Management System - Track attendance, salary, and payroll" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AttendanceMS" />
    
    <!-- Icons -->
    <link rel="icon" id="dynamic-favicon" type="image/png" href="/icons/selvam-logo.png" />
    <link rel="apple-touch-icon" href="/icons/selvam-logo.png" />
    <script>
      (function() {
        var img = new Image();
        img.onload = function() {
          var c = document.createElement('canvas');
          c.width = c.height = 64;
          var ctx = c.getContext('2d');
          ctx.beginPath();
          ctx.arc(32, 32, 32, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();
          ctx.drawImage(img, 0, 0, 64, 64);
          var link = document.getElementById('dynamic-favicon');
          link.href = c.toDataURL('image/png');
        };
        img.src = '/icons/selvam-logo.png';
      })();
    </script>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <title>Selvam Tea Stall</title>
    
    <!-- Splash screen for iOS -->
    <style>
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
